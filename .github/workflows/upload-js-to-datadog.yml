name: Upload JS and sourcemaps to DataDog
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Energy Apps"]
    types:
      - completed

jobs:
  dd-js-upload:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
      DATADOG_SITE: datadoghq.eu
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: "Setup ruby"
        uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5
        with:
          bundler-cache: true

      - name: "Setup node"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc

      - name: "Install npm packages"
        uses: bahmutov/npm-install@20216767ca67f0f7b4d095dc5859c5700a6581cb

      - name: "Install datadog-ci upload tools"
        run: npm install -g @datadog/datadog-ci

      - name: "Precompile assets"
        run: bundle exec rails assets:precompile

      - name: "Upload js assets"
        run: | 
          datadog-ci sourcemaps upload ./public/energy-apps-assets \
          --service=energy-apps \
          --release-version=${{ env.IMAGE_TAG }} \
          --minified-path-prefix=/energy-apps-assets/
