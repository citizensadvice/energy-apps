name: Lint and test
on:
  pull_request:
    types: ["opened", "synchronize"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: "Setup ruby"
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a
        with:
          bundler-cache: true

      - name: "Setup node"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc

      - name: "Install npm packages"
        uses: bahmutov/npm-install@20216767ca67f0f7b4d095dc5859c5700a6581cb

      - name: "Node lint"
        run: yarn run lint

      - name: "Ruby lint"
        run: bundle exec rubocop --format progress --format github

      - name: "Haml lint"
        run: bundle exec haml-lint app/**/*.html.haml

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: "Setup ruby"
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a
        with:
          bundler-cache: true

      - name: "Setup node"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc

      - name: "Install npm packages"
        uses: bahmutov/npm-install@20216767ca67f0f7b4d095dc5859c5700a6581cb

      - name: "Precompile assets"
        run: bundle exec rails assets:precompile

      - name: "Rspec"
        run: bundle exec rspec

  audit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: "Setup ruby"
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a
        with:
          bundler-cache: true

      - name: "Bundle audit"
        run: bundle exec bundle-audit

      - name: "Brakeman audit"
        run: bundle exec brakeman

      - name: "License audit"
        run: bundle exec license_finder

  feature-test:
    runs-on: ubuntu-latest
    environment: dev
    env:
      RAILS_ENV: test
      CONTENTFUL_CDA_TOKEN: ${{ secrets.CONTENTFUL_CDA_TOKEN }}
      CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
      CONTENTFUL_ENVIRONMENT_ID: ${{ secrets.CONTENTFUL_ENVIRONMENT_ID }}
      LOCAL_RETURN_HOST: "127.0.0.1"
    needs: lint
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: "Setup ruby"
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a
        with:
          bundler-cache: true

      - name: "Setup node"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc

      - name: "Install npm packages"
        uses: bahmutov/npm-install@20216767ca67f0f7b4d095dc5859c5700a6581cb

      - name: "Precompile assets"
        run: bundle exec rails assets:precompile

      - name: "Cucumber"
        run: bundle exec cucumber

      # Archive test logs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: failure()
        with:
          name: test-logs
          path: ./log/test.log
          retention-days: 7
